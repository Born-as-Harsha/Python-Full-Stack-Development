{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account | KL University</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI;
    background: linear-gradient(135deg, #8B0000, #ff3c3c);
}

.auth-card{
    width:400px;
    background:white;
    border-radius:18px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
    text-align:center;
}

.auth-logo{
    width:90px;
    margin-bottom:10px;
}

.form-control{
    border-radius:8px;
    padding:10px;
}

.btn-kl{
    background:#b30000;
    color:white;
    border-radius:8px;
    font-weight:600;
}

.btn-kl:hover{
    background:#800000;
}
</style>

</head>

<body>

<div class="auth-card">

<img src="{% static 'images/kl_logo_small.png' %}" class="auth-logo">

<h4>Create Account</h4>
<p class="text-muted">KL University Activity Tracker</p>

{% if messages %}
{% for message in messages %} <div class="alert alert-danger">{{ message }}</div>
{% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<!-- STUDENT ID -->

<input type="text" name="username" class="form-control mb-2" placeholder="Student ID" required>

<!-- EMAIL -->

<input type="email" name="email" class="form-control mb-2" placeholder="Email" required>

<!-- PHONE -->

<input type="text" name="phone" class="form-control mb-2" placeholder="Phone Number" pattern="[0-9]{10}" required>

<!-- PASSWORD -->

<input type="password" name="password" class="form-control mb-2" placeholder="Password" required>

<!-- CAPTCHA -->

<div class="mb-2">
    {{ form.captcha }}
</div>

<!-- SUBMIT -->

<button type="submit" class="btn btn-kl w-100 mb-2">
    Send OTP
</button>

</form>

<p class="mt-3">
Already have account? <a href="{% url 'home' %}">Login</a>
</p>

</div>

</body>
</html>
