{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Verify OTP | KL University</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#8B0000,#ff3c3c);
    font-family:Segoe UI;
}

/* CARD */
.card{
    width:360px;
    padding:30px;
    border-radius:18px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
    text-align:center;
    background:white;
}

/* LOGO */
.logo{
    width:85px;
    margin-bottom:10px;
}

/* BUTTON */
.btn-kl{
    background:#b30000;
    color:white;
    font-weight:600;
    border-radius:8px;
    padding:10px;
}

.btn-kl:hover{
    background:#800000;
}

/* INPUT */
.form-control{
    border-radius:8px;
    padding:10px;
    text-align:center;
    font-size:18px;
    letter-spacing:3px;
}

/* TIMER */
.timer{
    font-size:14px;
    color:#666;
}

/* RESEND */
.resend{
    font-size:14px;
    cursor:pointer;
    color:#b30000;
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">

<img src="{% static 'images/kl_logo_small.png' %}" class="logo">

<h4 class="text-danger">OTP Verification</h4>
<p class="text-muted">Enter OTP sent to your email</p>

<!-- MESSAGES -->
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="otp" maxlength="6" class="form-control mb-3" placeholder="Enter OTP" required>

<button class="btn btn-kl w-100">Verify & Create Account</button>

</form>

<!-- TIMER -->
<p class="mt-3 timer">
OTP expires in <span id="countdown">60</span> sec
</p>

<!-- RESEND -->
<p class="resend" onclick="resendOTP()">Resend OTP</p>

</div>

<script>
// ⏳ OTP TIMER
let time = 60;
let timer = setInterval(() => {
    time--;
    document.getElementById("countdown").innerText = time;

    if(time <= 0){
        clearInterval(timer);
        document.getElementById("countdown").innerText = "Expired";
    }
}, 1000);

// 🔁 RESEND OTP (simple reload)
function resendOTP(){
    location.reload();
}
</script>

</body>
</html>
