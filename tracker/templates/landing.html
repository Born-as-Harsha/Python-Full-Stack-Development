{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KL University | Student Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    height:100vh;
    background: linear-gradient(135deg, #b30000, #ff4d4d);
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background:white;
    padding:12px;
    text-align:center;
    font-weight:600;
    color:#b30000;
    letter-spacing:1px;
    border-bottom:2px solid #b30000;
}

/* CENTER BOX */
.container-box{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card-box{
    background:white;
    padding:40px;
    border-radius:15px;
    width:400px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* LOGO */
.logo{
    width:90px;
    margin-bottom:15px;
}

/* BUTTONS */
.btn-main{
    width:100%;
    padding:10px;
    border-radius:8px;
    font-weight:600;
}

.btn-login{
    background:#b30000;
    color:white;
}

.btn-login:hover{
    background:#900000;
}

.btn-register{
    background:#f1f1f1;
    color:#333;
    margin-top:10px;
}

.btn-register:hover{
    background:#ddd;
}

</style>
</head>

<body>

<div class="header">
    KL UNIVERSITY | STUDENT PORTAL
</div>

<div class="container-box">

    <div class="card-box">

        <img src="{% static 'images/kl_logo_small.png' %}" class="logo">

        <h4 class="mb-3">Welcome</h4>
        <p class="text-muted">Student Activity Management System</p>

        <!-- LOGIN -->
        <a href="{% url 'home' %}" class="btn btn-main btn-login">
            🔐 Login
        </a>

        <!-- REGISTER -->
        <a href="{% url 'register' %}" class="btn btn-main btn-register">
            📝 Create Account
        </a>

    </div>

</div>

</body>
</html>
